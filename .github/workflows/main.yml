name: "vprofile Application"
 
on:
  workflow_dispatch:           # manual trigger
  push:
    branches:
      - mine
 
permissions:
  id-token: write   # for OIDC
  contents: read
 
env:
  AWS_REGION:      ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY:  vprofile222
  EKS_CLUSTER:     vprofile-eks

jobs:
  Testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
 
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"
 
      - name: Maven test
        run: mvn -B test
 
      - name: Maven checkstyle
        run: mvn -B checkstyle:checkstyle

  BUILD_AND_PUBLISH:
    needs: Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}
 
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Build, tag, and push image to Amazon ECR
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:latest \
                       -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  DEPLOY:
    needs: BUILD_AND_PUBLISH
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}
 
      - name: Get full EKS cluster name
        id: cluster
        run: |
          NAME=$(aws eks list-clusters --region $AWS_REGION \
                   --query "clusters[?starts_with(@, '$EKS_CLUSTER')] | [0]" \
                   --output text)
          echo "name=$NAME" >> $GITHUB_OUTPUT
 
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name ${{ steps.cluster.outputs.name }}
 
      - name: Create ECR pull secret in Kubernetes
        run: |
          kubectl delete secret regcred --ignore-not-found
          kubectl create secret docker-registry regcred \
            --docker-server=${{ secrets.REGISTRY }} \
            --docker-username=AWS \
            --docker-password=$(aws ecr get-login-password --region $AWS_REGION)
 
            
      - name: Install NGINX Ingress Controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/aws/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=300s

      - name: Deploy with Helm
        uses: bitovi/github-actions-deploy-eks-helm@v1.2.10
        with:
          aws-region: ${{ env.AWS_REGION }}
          cluster-name: ${{ steps.cluster.outputs.name }}
          chart-path: helm/vprofilecharts
          namespace: default
          name: vprofile-stack
          values: appimage=${{ secrets.REGISTRY }}/${{ env.ECR_REPOSITORY }},apptag=${{ github.run_number }}

      - name: Diagnose deployment
        if: always()    # run even if previous steps failed
        run: |
          echo "=== Pods ==="
          kubectl get pods -A
          echo ""
          echo "=== Services ==="
          kubectl get svc -A
          echo ""
          echo "=== Ingresses ==="
          kubectl get ingress -A
          echo ""
          echo "=== Pod details (vproapp) ==="
          kubectl describe pod -l app=vproapp
          echo ""
          echo "=== Ingress controller pods ==="
          kubectl get pods -n ingress-nginx


